<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fierro Viejo y Familia</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Fira+Sans:wght@300;400;500&family=Abril+Fatface&display=swap" rel="stylesheet" />
  <style>
    :root {
      --terracotta: #C8553D;
      --gold: #E8A838;
      --cream: #F5EDD8;
      --dark: #1A1208;
      --green: #4A7C59;
      --sand: #D4B896;
      --ink: #2C1F0E;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background-color: var(--dark);
      color: var(--cream);
      font-family: 'Fira Sans', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      padding: 4rem 2rem;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 40%, rgba(200,85,61,0.25) 0%, transparent 55%),
        radial-gradient(ellipse at 70% 70%, rgba(232,168,56,0.15) 0%, transparent 50%);
    }

    .hero-shapes::before {
      content: '';
      position: absolute;
      top: -100px; right: -100px;
      width: 500px; height: 500px;
      border: 1px solid rgba(232,168,56,0.08);
      border-radius: 50%;
      pointer-events: none;
    }

    .hero-shapes::after {
      content: '';
      position: absolute;
      bottom: -80px; left: -80px;
      width: 350px; height: 350px;
      border: 1px solid rgba(200,85,61,0.1);
      transform: rotate(45deg);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
    }

    .hero-flags {
      font-size: 1.6rem;
      margin-bottom: 2rem;
      letter-spacing: 0.5rem;
      opacity: 0;
      animation: fadeUp 1s ease 0.2s forwards;
    }

    .hero-title {
      font-family: 'Abril Fatface', serif;
      font-size: clamp(3rem, 9vw, 7.5rem);
      line-height: 0.95;
      color: var(--cream);
      opacity: 0;
      animation: fadeUp 1s ease 0.4s forwards;
    }

    .hero-title .y {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--terracotta);
      font-size: 0.7em;
    }

    .hero-title .familia {
      color: var(--gold);
      display: block;
    }

    .hero-sub {
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(245,237,216,0.4);
      margin-top: 1.5rem;
      opacity: 0;
      animation: fadeUp 1s ease 0.7s forwards;
    }

    .hero-scroll {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(245,237,216,0.25);
      opacity: 0;
      animation: fadeUp 1s ease 1.2s forwards;
    }

    .hero-scroll::after {
      content: '';
      width: 1px;
      height: 40px;
      background: rgba(245,237,216,0.2);
      animation: scrollLine 2s ease-in-out infinite;
    }

    @keyframes scrollLine {
      0%, 100% { opacity: 0.2; transform: scaleY(1); }
      50% { opacity: 0.6; transform: scaleY(1.3); }
    }

    /* ── SECOES ── */
    .sections {
      padding: 0 3rem 6rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .sections-label {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(245,237,216,0.25);
      text-align: center;
      padding: 4rem 0 3rem;
    }

    .sections-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5px;
    }

    .section-card {
      position: relative;
      overflow: hidden;
      aspect-ratio: 4/3;
      cursor: pointer;
      text-decoration: none;
      display: block;
      background: #221a0e;
    }

    .section-card-cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s ease, filter 0.6s ease;
      filter: brightness(0.55) saturate(0.8);
    }

    .section-card:hover .section-card-cover {
      transform: scale(1.05);
      filter: brightness(0.4) saturate(0.6);
    }

    .section-card-info {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 2rem;
      background: linear-gradient(to top, rgba(26,18,8,0.9) 0%, transparent 60%);
    }

    .section-card-tag {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.4rem;
    }

    .section-card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--cream);
      line-height: 1.1;
    }

    .section-card-count {
      font-size: 0.75rem;
      color: rgba(245,237,216,0.45);
      margin-top: 0.5rem;
      letter-spacing: 0.1em;
    }

    .section-card-arrow {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(245,237,216,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: var(--cream);
      opacity: 0;
      transform: translateY(5px);
      transition: opacity 0.3s, transform 0.3s;
    }

    .section-card:hover .section-card-arrow {
      opacity: 1;
      transform: translateY(0);
    }

    /* CARD ESPECIAL — em breve */
    .section-card.coming-soon {
      cursor: default;
      background: #1e1508;
    }

    .section-card.coming-soon .section-card-cover {
      filter: brightness(0.2) saturate(0);
    }

    .coming-soon-badge {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      background: rgba(232,168,56,0.15);
      border: 1px solid rgba(232,168,56,0.3);
      color: var(--gold);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.3rem 0.8rem;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid rgba(245,237,216,0.06);
      padding: 3rem;
      text-align: center;
    }

    .footer-logo {
      font-family: 'Abril Fatface', serif;
      font-size: 1.2rem;
      color: var(--gold);
      opacity: 0.6;
    }

    .footer-text {
      font-size: 0.75rem;
      color: rgba(245,237,216,0.2);
      margin-top: 0.5rem;
      letter-spacing: 0.1em;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(25px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .sections { padding: 0 1rem 4rem; }
      .sections-grid { grid-template-columns: 1fr; gap: 1px; }
    }
  </style>
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-shapes"></div>

    <div class="hero-content">
      <div class="hero-flags">🇧🇷 🇫🇷 🇲🇽</div>
      <h1 class="hero-title">
        Fierro Viejo
        <span class="y">y</span>
        <span class="familia">Familia</span>
      </h1>
      <p class="hero-sub">4 años · 30+ viajes · 1 familia · México</p>
    </div>

    <div class="hero-scroll">scroll</div>
  </section>

  <!-- SEÇÕES -->
  <main class="sections">
    <p class="sections-label reveal">Nuestros álbumes</p>

    <div class="sections-grid">

      <!-- CIUDAD DE MÉXICO -->
      <a href="/ciudad-de-mexico.html" class="section-card reveal">
        <img class="section-card-cover"
          src="https://lh3.googleusercontent.com/pw/AP1GczOE0PmmeVnSHy31ssMsn899X59xphGpU8hFs6H8ESw1z3idLtLWIuDUwWxEwMQnc-yXm1tFCghQTonQ69WB10XcNUWGMa7Jc6qHH6yP8FkckETk-cT-=w800"
          alt="Ciudad de México" />
        <div class="section-card-info">
          <p class="section-card-tag">Cotidiano</p>
          <h2 class="section-card-title">Ciudad de México</h2>
          <p class="section-card-count">30+ fotos · 2021–2024</p>
        </div>
        <div class="section-card-arrow">→</div>
      </a>

      <!-- VIAGENS — EM BREVE -->
      <a class="section-card coming-soon reveal">
        <img class="section-card-cover"
          src="https://lh3.googleusercontent.com/pw/AP1GczMtbOhGjYJHtiyrk4IlYl7AWKWO2kwn348frmc0gbcQdVUaafYWRHwCeEGKn-e1ohM_QV6Ia-mrvjocWLPj0Z_gXH81fyuT0wFMmmnwh5ZBN0cCOOat=w800"
          alt="Viajes" />
        <div class="section-card-info">
          <p class="section-card-tag">Viajes</p>
          <h2 class="section-card-title">Oaxaca</h2>
          <p class="section-card-count">Em breve...</p>
        </div>
        <div class="coming-soon-badge">Em breve</div>
      </a>

      <a class="section-card coming-soon reveal">
        <img class="section-card-cover"
          src="https://lh3.googleusercontent.com/pw/AP1GczMqPjpW0EZ9gmOudEmExu4EXAVq6UKzN_pqwDgW8w4gMYGRdRdUCQS1jNu5uT01PCXEY0er2MpGVScJcX2OvwkHVefr0PNUJodSOwKnKQCaHa3tIodg=w800"
          alt="Yucatan" />
        <div class="section-card-info">
          <p class="section-card-tag">Viajes</p>
          <h2 class="section-card-title">Yucatán</h2>
          <p class="section-card-count">Em breve...</p>
        </div>
        <div class="coming-soon-badge">Em breve</div>
      </a>

    </div>
  </main>

  <footer>
    <div class="footer-logo">FVyF</div>
    <p class="footer-text">🇧🇷 🇫🇷 🇲🇽 · 2021–2024</p>
  </footer>

  <script>
    const reveals = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
          setTimeout(() => entry.target.classList.add('visible'), i * 100);
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });
    reveals.forEach(el => observer.observe(el));
  </script>

</body>
</html>
