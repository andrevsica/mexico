<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ciudad de México — Fierro Viejo y Familia</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Fira+Sans:wght@300;400;500&family=Abril+Fatface&display=swap" rel="stylesheet" />
  <style>
    :root {
      --terracotta: #C8553D;
      --gold: #E8A838;
      --cream: #F5EDD8;
      --dark: #1A1208;
      --ink: #2C1F0E;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--dark);
      color: var(--cream);
      font-family: 'Fira Sans', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 3rem;
      background: rgba(26,18,8,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(245,237,216,0.06);
    }

    .nav-back {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: rgba(245,237,216,0.5);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.3s;
    }
    .nav-back:hover { color: var(--gold); }

    .nav-logo {
      font-family: 'Abril Fatface', serif;
      font-size: 1rem;
      color: var(--gold);
      text-decoration: none;
    }

    /* ── HEADER ── */
    .page-header {
      padding: 5rem 3rem 3rem;
      max-width: 1400px;
      margin: 0 auto;
      border-bottom: 1px solid rgba(245,237,216,0.06);
      margin-bottom: 3rem;
    }

    .page-tag {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
    }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 700;
      line-height: 1;
      color: var(--cream);
    }

    .page-title em {
      font-style: italic;
      color: var(--terracotta);
    }

    .page-meta {
      font-size: 0.8rem;
      color: rgba(245,237,216,0.3);
      margin-top: 1rem;
      letter-spacing: 0.1em;
    }

    /* ── GALERIA MOSAICO ── */
    .gallery {
      columns: 4;
      column-gap: 3px;
      padding: 0 3rem 6rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 3px;
      overflow: hidden;
      cursor: zoom-in;
      position: relative;
    }

    .gallery-item img {
      width: 100%;
      display: block;
      transition: transform 0.5s ease, filter 0.5s ease;
      filter: brightness(0.92);
    }

    .gallery-item:hover img {
      transform: scale(1.03);
      filter: brightness(0.75);
    }

    .gallery-item-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .gallery-item:hover .gallery-item-overlay { opacity: 1; }

    .gallery-item-overlay span {
      width: 44px;
      height: 44px;
      border: 1.5px solid rgba(245,237,216,0.6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: var(--cream);
    }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.96);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    #lightbox.open { display: flex; }

    #lightbox-img {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
      box-shadow: 0 0 100px rgba(0,0,0,0.8);
      animation: zoomIn 0.25s ease;
    }

    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 1; transform: scale(1); }
    }

    .lightbox-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: 50px;
      background: rgba(245,237,216,0.08);
      border: 1px solid rgba(245,237,216,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--cream);
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.3s;
      z-index: 10000;
    }
    .lightbox-nav:hover { background: rgba(245,237,216,0.15); }
    .lightbox-prev { left: 1.5rem; }
    .lightbox-next { right: 1.5rem; }

    .lightbox-close {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      width: 44px;
      height: 44px;
      background: rgba(245,237,216,0.08);
      border: 1px solid rgba(245,237,216,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--cream);
      font-size: 1rem;
      cursor: pointer;
      z-index: 10000;
      transition: background 0.3s;
    }
    .lightbox-close:hover { background: rgba(245,237,216,0.15); }

    .lightbox-counter {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: rgba(245,237,216,0.35);
      z-index: 10000;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1100px) { .gallery { columns: 3; } }
    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      .page-header { padding: 3rem 1.5rem 2rem; }
      .gallery { columns: 2; padding: 0 1rem 4rem; }
    }
    @media (max-width: 480px) { .gallery { columns: 1; } }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-back">← Álbumes</a>
    <a href="index.html" class="nav-logo">FVyF</a>
  </nav>

  <!-- HEADER -->
  <header class="page-header">
    <p class="page-tag">Cotidiano · 2021–2024</p>
    <h1 class="page-title">Ciudad de <em>México</em></h1>
    <p class="page-meta">El día a día · La vida en el DF</p>
  </header>

  <!-- LIGHTBOX -->
  <div id="lightbox" onclick="handleLightboxClick(event)">
    <div class="lightbox-close" onclick="closeLightbox()">✕</div>
    <div class="lightbox-nav lightbox-prev" onclick="event.stopPropagation(); navigate(-1)">‹</div>
    <img id="lightbox-img" src="" alt="" />
    <div class="lightbox-nav lightbox-next" onclick="event.stopPropagation(); navigate(1)">›</div>
    <div class="lightbox-counter" id="lightbox-counter"></div>
  </div>

  <!-- GALERIA -->
  <main class="gallery" id="gallery"></main>

      "https://lh3.googleusercontent.com/pw/AP1GczPmscZMorSgTGUcgOGQjtteaioFkHg3w_qLIN6a7T4E7GSWvAF757CXno24uPk5ezRFwbDk4IgV64woPyEgM9FEUFgpMAYIZfc5p_vr7GzCzw_r3kdy",
      "https://lh3.googleusercontent.com/pw/AP1GczOU-mkZEqgK6SD6HbLasot9q7_wfy5Txo5d5aflmFhN9ubxLnhX1t8ocqpw2aFtJlzreXnnv14M0EEYk3PE5MIuq4OTbra8ZrDG11FLsi1Cs-lppRvz",
    ];

    let currentIndex = 0;

    // Build gallery
    const gallery = document.getElementById('gallery');
    photos.forEach((base, i) => {
      const item = document.createElement('div');
      item.className = 'gallery-item';
      item.innerHTML = `
        <img src="${base}=w600" loading="lazy" alt="Foto ${i+1}" />
        <div class="gallery-item-overlay"><span>⊕</span></div>
      `;
      item.addEventListener('click', () => openLightbox(i));
      gallery.appendChild(item);
    });

    function openLightbox(index) {
      currentIndex = index;
      const lb = document.getElementById('lightbox');
      const img = document.getElementById('lightbox-img');
      img.src = photos[currentIndex] + '=w1600';
      document.getElementById('lightbox-counter').textContent = `${currentIndex + 1} / ${photos.length}`;
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    function navigate(dir) {
      currentIndex = (currentIndex + dir + photos.length) % photos.length;
      const img = document.getElementById('lightbox-img');
      img.style.opacity = '0';
      setTimeout(() => {
        img.src = photos[currentIndex] + '=w1600';
        img.style.opacity = '1';
        document.getElementById('lightbox-counter').textContent = `${currentIndex + 1} / ${photos.length}`;
      }, 150);
    }

    function handleLightboxClick(e) {
      if (e.target === document.getElementById('lightbox')) closeLightbox();
    }

    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') navigate(1);
      if (e.key === 'ArrowLeft') navigate(-1);
    });

    // Transition for lightbox img
    document.getElementById('lightbox-img').style.transition = 'opacity 0.15s ease';
  </script>

</html>
